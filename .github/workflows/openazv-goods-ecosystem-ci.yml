name: OpenAZV Goods Ecosystem CI

on:
  push:
    paths:
      - 'openazv-goods-ecosystem/**'
      - '.github/workflows/openazv-goods-ecosystem-ci.yml'
  pull_request:
    paths:
      - 'openazv-goods-ecosystem/**'
      - '.github/workflows/openazv-goods-ecosystem-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openazv-goods-ecosystem
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: python -m pip install -e .[dev]
      - name: Run tests
        run: pytest
